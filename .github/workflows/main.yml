name: Windows RDP with Pinggy

on: 
  workflow_dispatch: # Allows you to manually start this from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # Keeps the VM alive up to 6 hours (GitHub's maximum)

    steps:
      # Step 1: Enable Remote Desktop (RDP) on the Windows Runner
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      # Step 2: Create a dedicated RDP User Account
      - name: Create RDP User
        run: |
          $Password = ConvertTo-SecureString "P@ssw0rd!123" -AsPlainText -Force
          New-LocalUser -Name "runneradmin" -Password $Password -Description "RDP Admin"
          Add-LocalGroupMember -Group "Administrators" -Member "runneradmin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin"

      # Step 3: Run Pinggy to start the TCP tunnel and keep it alive
      - name: Create Tunnel & Keep Alive
        run: |
          echo "========================================================"
          echo "CONNECTING TO PINGGY... LOOK BELOW FOR YOUR RDP ADDRESS!"
          echo "========================================================"
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R0:localhost:3389 tcp@free.pinggy.io
